name: Inject nav-fix.js into all HTML pages

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject nav-fix.js into all HTML files
        run: |
          SCRIPT='<script src="/nav-fix.js"><\/script>'
          COUNT=0
          for f in $(find . -name '*.html' -not -path './.git/*'); do
            if grep -q 'nav-fix.js' "$f"; then
              echo "SKIP: $f"
            else
              sed -i "s|</body>|${SCRIPT}\n</body>|" "$f"
              echo "INJECTED: $f"
              COUNT=$((COUNT+1))
            fi
          done
          echo "Total injected: $COUNT"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add -A
          git diff --staged --quiet || git commit -m "Fix: Inject nav-fix.js into all HTML pages sitewide"
          git push
