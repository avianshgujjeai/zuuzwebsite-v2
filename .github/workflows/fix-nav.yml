MOBILE_CSS = '''
.nav-item:hover .dropdown{display:none}
.dropdown.open{display:block!important}
@media(hover:hover) and (pointer:fine){.nav-item:hover .dropdown{display:block}}
@media(max-width:768px){.nav-desktop-only{display:none!important}}
.hamburger{display:none;flex-direction:column;justify-content:center;align-items:center;gap:5px;width:40px;height:40px;background:transparent;border:none;cursor:pointer;padding:4px;border-radius:6px;z-index:200}
.hamburger span{display:block;width:22px;height:2px;background:var(--wht,#fff);border-radius:2px;transition:transform .25s ease,opacity .25s ease;transform-origin:center}
.hamburger.active span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.active span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
@media(max-width:768px){.hamburger{display:flex}.nav-links{display:none!important}}
.mobile-nav{position:fixed;top:0;right:-100%;width:min(320px,88vw);height:100dvh;background:rgba(12,12,24,.98);backdrop-filter:blur(20px);border-left:1px solid rgba(255,255,255,.08);z-index:150;transition:right .3s cubic-bezier(.16,1,.3,1);overflow-y:auto;-webkit-overflow-scrolling:touch}
.mobile-nav.open{right:0}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:140}
.mobile-overlay.open{display:block}
.mobile-nav-inner{display:flex;flex-direction:column;height:100%;padding:80px 0 24px}
.mobile-nav-section{flex:1;overflow-y:auto;padding:0 16px}
.mobile-nav-group{margin-bottom:2px}
.mobile-nav-trigger{display:flex;align-items:center;justify-content:space-between;width:100%;padding:13px 16px;background:transparent;border:none;color:rgba(255,255,255,.75);font-size:14px;font-weight:500;cursor:pointer;border-radius:8px;font-family:inherit;transition:background .15s,color .15s;text-align:left;min-height:44px}
.mobile-nav-trigger:hover,.mobile-nav-trigger.active{background:rgba(255,255,255,.06);color:#fff}
.mob-arrow{transition:transform .2s ease;font-size:11px}
.mobile-nav-trigger.active .mob-arrow{transform:rotate(180deg)}
.mobile-nav-sub{display:none;padding:4px 0 4px 16px}
.mobile-nav-sub.open{display:block}
.mobile-nav-sub a{display:flex;align-items:center;padding:10px 16px;color:rgba(255,255,255,.55);font-size:13px;font-weight:400;text-decoration:none;border-radius:6px;transition:background .15s,color .15s;min-height:44px}
.mobile-nav-sub a:hover{background:rgba(255,255,255,.05);color:#fff}
.mobile-nav-link{display:flex;align-items:center;padding:13px 16px;color:rgba(255,255,255,.75);font-size:14px;font-weight:500;text-decoration:none;border-radius:8px;min-height:44px;transition:background .15s,color .15s}
.mobile-nav-link:hover{background:rgba(255,255,255,.06);color:#fff}
.mobile-nav-cta{padding:16px 24px 8px;display:flex;flex-direction:column;gap:12px;border-top:1px solid rgba(255,255,255,.08);margin-top:8px}
body.nav-open{overflow:hidden}
@media(max-width:768px){nav{height:60px!important;padding:0 20px!important}body{overflow-x:hidden;max-width:100vw}}
'''

NAV_JS = '''
<script>
(function(){
  var hb=document.getElementById("hamburger"),mn=document.getElementById("mobileNav"),ov=document.getElementById("mobileOverlay");
  function open(){hb.classList.add("active");mn.classList.add("open");ov.classList.add("open");document.body.classList.add("nav-open");hb.setAttribute("aria-expanded","true");mn.setAttribute("aria-hidden","false")}
  function close(){hb.classList.remove("active");mn.classList.remove("open");ov.classList.remove("open");document.body.classList.remove("nav-open");hb.setAttribute("aria-expanded","false");mn.setAttribute("aria-hidden","true")}
  hb.addEventListener("click",function(){mn.classList.contains("open")?close():open()});
  ov.addEventListener("click",close);
  document.addEventListener("keydown",function(e){if(e.key==="Escape")close()});
  document.querySelectorAll(".mobile-nav-trigger").forEach(function(btn){
    btn.addEventListener("click",function(){
      var id=btn.getAttribute("data-mobile"),sub=document.getElementById(id),was=sub.classList.contains("open");
      document.querySelectorAll(".mobile-nav-sub").forEach(function(s){s.classList.remove("open")});
      document.querySelectorAll(".mobile-nav-trigger").forEach(function(b){b.classList.remove("active")});
      if(!was){sub.classList.add("open");btn.classList.add("active")}
    })
  });
  document.querySelectorAll(".nav-trigger").forEach(function(t){
    t.addEventListener("click",function(e){
      e.stopPropagation();
      var id=t.getAttribute("data-menu"),d=document.getElementById(id),was=d.classList.contains("open");
      document.querySelectorAll(".dropdown").forEach(function(x){x.classList.remove("open")});
      if(!was)d.classList.add("open")
    })
  });
  document.addEventListener("click",function(){document.querySelectorAll(".dropdown").forEach(function(d){d.classList.remove("open")})});
  document.querySelectorAll(".dropdown").forEach(function(d){d.addEventListener("click",function(e){e.stopPropagation()})});
})();
</script>
'''

with open("index.html","r",encoding="utf-8") as f:
    html=f.read()
print(f"Original: {len(html)}")

old_s=html.find('<nav id="nav">')
old_e=html.find('</nav>')+len('</nav>')
html=html[:old_s]+NEW_NAV+html[old_e:]

if ".mobile-nav.open" not in html:
    sc=html.rfind("</style>")
    html=html[:sc]+MOBILE_CSS+"\n"+html[sc:]

if "mobile-nav-trigger" not in html:
    bc=html.rfind("</body>")
    html=html[:bc]+NAV_JS+"\n"+html[bc:]

with open("index.html","w",encoding="utf-8") as f:
    f.write(html)
print(f"Patched: {len(html)}")
print("OK hamburger:",\'<button class="hamburger"\' in html)
print("OK mobile css:",".mobile-nav.open" in html)
print("OK nav js:","mobile-nav-trigger" in html)
PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "Fix: Working dropdowns, mobile hamburger, all nav links wired"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/avianshgujjeai/zuuzwebsite-v2.git HEAD:main
